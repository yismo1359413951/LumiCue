<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
html,body{margin:0;background:transparent}
.icon{width:1024px;height:1024px;border-radius:230px;position:relative;overflow:hidden;
 background:radial-gradient(120% 120% at 50% 22%,#241338,#120a22 58%,#080510);
 display:flex;align-items:center;justify-content:center;box-shadow:inset 0 6px 0 rgba(255,255,255,.10)}
.ring{width:600px;height:600px;border-radius:50%;
 background:conic-gradient(from 210deg,#818cf8,#a855f7 38%,#d946ef 68%,#818cf8);
 filter:drop-shadow(0 0 60px rgba(168,85,247,.65)) drop-shadow(0 0 120px rgba(217,70,239,.45));
 display:flex;align-items:center;justify-content:center}
.hole{width:392px;height:392px;border-radius:50%;background:radial-gradient(circle,#150c28,#0c0718)}
</style></head><body><div class="icon"><div class="ring"><div class="hole"></div></div></div></body></html>
