<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
html,body{margin:0;background:transparent}
.icon{width:1024px;height:1024px;border-radius:230px;position:relative;overflow:hidden;
 background:radial-gradient(120% 120% at 50% 25%,#1a2030,#0a0d15 60%,#05070c);
 display:flex;align-items:center;justify-content:center;box-shadow:inset 0 6px 0 rgba(255,255,255,.10)}
.ring{width:600px;height:600px;border-radius:50%;
 background:conic-gradient(from 210deg,#22d3ee,#818cf8 40%,#c084fc 70%,#22d3ee);
 filter:drop-shadow(0 0 55px rgba(94,234,212,.6)) drop-shadow(0 0 110px rgba(167,139,250,.45));
 display:flex;align-items:center;justify-content:center}
.hole{width:392px;height:392px;border-radius:50%;background:radial-gradient(circle,#0b0e16,#070a11);
 display:flex;align-items:center;justify-content:center}
.line{width:240px;height:56px;border-radius:30px;background:linear-gradient(90deg,#22d3ee,#a78bfa);
 box-shadow:0 0 45px 10px rgba(94,234,212,.7)}
</style></head><body><div class="icon"><div class="ring"><div class="hole"><div class="line"></div></div></div></div></body></html>
