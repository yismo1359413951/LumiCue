<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
html,body{margin:0;background:transparent}
.icon{width:1024px;height:1024px;border-radius:230px;position:relative;overflow:hidden;
 background:radial-gradient(120% 120% at 50% 25%,#161b29,#0a0d15 60%,#05070c);
 display:flex;align-items:center;justify-content:center;box-shadow:inset 0 6px 0 rgba(255,255,255,.10)}
.orb{width:560px;height:560px;border-radius:50%;
 background:radial-gradient(circle at 38% 32%,#a5f3fc,#22d3ee 35%,#818cf8 65%,#7c3aed 100%);
 box-shadow:0 0 70px 14px rgba(94,234,212,.55),0 0 140px 40px rgba(124,58,237,.4),inset -30px -40px 70px rgba(0,0,0,.35),inset 20px 24px 60px rgba(255,255,255,.35);
 position:relative}
.gloss{position:absolute;top:70px;left:120px;width:200px;height:120px;border-radius:50%;
 background:radial-gradient(circle,rgba(255,255,255,.7),transparent 70%);filter:blur(6px)}
</style></head><body><div class="icon"><div class="orb"><div class="gloss"></div></div></div></body></html>
