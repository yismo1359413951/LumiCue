<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
  html,body{margin:0;padding:0;background:transparent}
  .wrap{width:1024px;height:1024px;display:flex;align-items:center;justify-content:center}
  .icon{
    width:1024px;height:1024px;border-radius:230px;position:relative;overflow:hidden;
    background:radial-gradient(120% 120% at 50% 0%, #1b2233 0%, #0b0e16 55%, #06080d 100%);
    box-shadow:inset 0 4px 0 rgba(255,255,255,.10), inset 0 0 0 4px rgba(255,255,255,.05);
  }
  /* 流光描边 */
  .ring{position:absolute;inset:0;border-radius:230px;padding:6px;
    background:linear-gradient(135deg,#5eead4,#818cf8 40%,#c084fc 70%,#5eead4);
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;opacity:.55}
  /* 灵动岛黑玻璃药丸 */
  .pill{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:660px;height:420px;border-radius:90px;
    background:linear-gradient(180deg,#161b29ee,#0a0d15ee);
    box-shadow:0 30px 80px rgba(0,0,0,.5), inset 0 2px 0 rgba(255,255,255,.12);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:34px}
  /* 三行文字: 中间焦点行发光 */
  .ln{border-radius:30px}
  .dim{height:34px;width:330px;background:rgba(255,255,255,.22)}
  .dim2{height:34px;width:250px;background:rgba(255,255,255,.16)}
  .focus{height:56px;width:430px;
    background:linear-gradient(90deg,#22d3ee,#a78bfa);
    box-shadow:0 0 50px 10px rgba(94,234,212,.65),0 0 90px 20px rgba(167,139,250,.4)}
  /* 底部发光进度+彗星头 */
  .bar{position:absolute;left:130px;right:130px;bottom:150px;height:14px;border-radius:8px;
    background:rgba(255,255,255,.14)}
  .fill{position:absolute;left:130px;bottom:150px;height:14px;width:300px;border-radius:8px;
    background:linear-gradient(90deg,#22d3ee,#a78bfa);box-shadow:0 0 30px 6px rgba(94,234,212,.7)}
  .head{position:absolute;left:418px;bottom:140px;width:34px;height:34px;border-radius:50%;
    background:#fff;box-shadow:0 0 40px 10px rgba(165,243,252,.95);border:5px solid rgba(120,247,255,.9)}
</style></head><body>
<div class="wrap"><div class="icon">
  <div class="ring"></div>
  <div class="pill">
    <div class="ln dim"></div>
    <div class="ln focus"></div>
    <div class="ln dim2"></div>
  </div>
  <div class="bar"></div>
  <div class="fill"></div>
  <div class="head"></div>
</div></div>
</body></html>
