<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
  html,body{margin:0;padding:0;background:transparent}
  .icon{width:1024px;height:1024px;border-radius:230px;position:relative;overflow:hidden;
    background:radial-gradient(130% 130% at 50% 0%, #222a3d 0%, #0c1019 55%, #05070c 100%);
    box-shadow:inset 0 6px 0 rgba(255,255,255,.10)}
  .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:46px}
  .bar{border-radius:40px}
  .top{width:300px;height:40px;background:rgba(255,255,255,.20)}
  .hero{width:520px;height:96px;
    background:linear-gradient(90deg,#22d3ee,#818cf8 55%,#c084fc);
    box-shadow:0 0 90px 18px rgba(94,234,212,.6),0 0 150px 40px rgba(167,139,250,.4)}
  .bot{width:230px;height:40px;background:rgba(255,255,255,.14)}
</style></head><body>
<div class="icon"><div class="center">
  <div class="bar top"></div>
  <div class="bar hero"></div>
  <div class="bar bot"></div>
</div></div>
</body></html>
