name: ✨ Feature Request
description: Suggest a new feature or improvement for Snapzy
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea so we can evaluate and prioritize it.

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: Is your feature request related to a problem? Describe the pain point or motivation.
      placeholder: I'm frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution or feature you'd like to see.
      placeholder: It would be great if Snapzy could...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?
    validations:
      required: false

  - type: dropdown
    id: feature-area
    attributes:
      label: Feature Area
      description: Which part of Snapzy does this relate to?
      options:
        - Screenshots
        - Screen Recording
        - Annotation / Editing
        - OCR / Text Extraction
        - Menu Bar / UI
        - Shortcuts / Quick Access
        - Export / Sharing
        - Settings / Preferences
        - Auto-Update (Sparkle)
        - Other
    validations:
      required: true

  - type: textarea
    id: mockups
    attributes:
      label: Mockups / References
      description: If you have any mockups, sketches, or references from other apps, attach them here.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context, use cases, or information about the feature request.
    validations:
      required: false
