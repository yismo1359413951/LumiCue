name: CI Build Check

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - name: Verify localization catalogs
        run: |
          set -euo pipefail
          mkdir -p build/swift-module-cache
          swift -module-cache-path build/swift-module-cache tools/localization/CatalogTool.swift verify

      - name: Run tests
        env:
          SNAPZY_CI_SKIP_TESTS: |
            SnapzyTests/DatabaseManagerTests
            SnapzyTests/QuickAccessCoreTests/testQuickAccessTrackpadSwipeModeStore_persistsMode
            SnapzyTests/QuickAccessCoreTests/testQuickAccessTrackpadSwipeModeStore_resetToDefault
            SnapzyTests/OCRRecognitionTests
            SnapzyTests/SmartElementCaptureControllerTests
            SnapzyTests/SmartElementWindowOwnerResolverTests
            SnapzyTests/SmartElementQueryServiceTests
            SnapzyTests/SandboxOffDataMigrationServiceTests
        run: |
          set -euo pipefail
          mkdir -p build
          rm -rf build/ci-test.xcresult
          test_args=()
          if [[ -n "${SNAPZY_CI_SKIP_TESTS:-}" ]]; then
            skip_tests="${SNAPZY_CI_SKIP_TESTS//$'\n'/ }"
            skip_tests="${skip_tests//,/ }"
            skip_tests="${skip_tests//;/ }"
            echo "Skipping XCTest identifiers from SNAPZY_CI_SKIP_TESTS:"
            for test_id in $skip_tests; do
              [[ -z "$test_id" ]] && continue
              echo "  - $test_id"
              test_args+=("-skip-testing:$test_id")
            done
          fi

          if ! xcodebuild \
            -project Snapzy.xcodeproj \
            -scheme Snapzy \
            -destination 'platform=macOS' \
            -derivedDataPath build/DerivedData \
            -resultBundlePath build/ci-test.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            "${test_args[@]}" \
            test > build/ci-test.log 2>&1; then
            echo "::group::Likely test failures"
            grep -E "Test case '.*' failed|Failing tests:|\\*\\* TEST FAILED \\*\\*|error:" build/ci-test.log || true
            echo "::endgroup::"
            tail -200 build/ci-test.log
            exit 1
          fi

          tail -20 build/ci-test.log

      - name: Upload test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-test-diagnostics
          path: |
            build/ci-test.log
            build/ci-test.xcresult

      - name: Build
        run: |
          set -euo pipefail
          mkdir -p build

          if ! xcodebuild \
            -project Snapzy.xcodeproj \
            -scheme Snapzy \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build > build/ci-build.log 2>&1; then
            tail -100 build/ci-build.log
            exit 1
          fi

          tail -20 build/ci-build.log

      - name: Verify app bundle
        run: |
          APP_PATH="build/DerivedData/Build/Products/Release/Snapzy.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Snapzy.app not found at expected path"
            exit 1
          fi
          echo "Build successful: $APP_PATH"
