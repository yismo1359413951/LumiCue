name: Release Prepare

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

  push:
    branches: [master]

concurrency:
  group: release-prepare-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-release-trigger:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version_type: ${{ steps.check.outputs.version_type }}
    steps:
      - name: Determine if release should run
        id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "version_type=${{ inputs.version_type }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ]; then
            if printf '%s\n' "$COMMIT_MSG" | grep -qE "^release\((patch|minor|major)\):"; then
              TYPE=$(printf '%s\n' "$COMMIT_MSG" | sed -nE 's/^release\((patch|minor|major)\):.*/\1/p' | head -n 1)
              echo "should_release=true" >> "$GITHUB_OUTPUT"
              echo "version_type=$TYPE" >> "$GITHUB_OUTPUT"
            else
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              echo "version_type=" >> "$GITHUB_OUTPUT"
            fi
          fi

  prepare:
    needs: check-release-trigger
    if: needs.check-release-trigger.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        id: version
        run: |
          chmod +x scripts/bump-version.sh
          OUTPUT=$(./scripts/bump-version.sh "${{ needs.check-release-trigger.outputs.version_type }}")
          VERSION=$(echo "$OUTPUT" | grep "^version=" | cut -d= -f2)
          PREV_VERSION=$(echo "$OUTPUT" | grep "^previous_version=" | cut -d= -f2)
          BUILD=$(echo "$OUTPUT" | grep "^build_number=" | cut -d= -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "previous_version=$PREV_VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD" >> "$GITHUB_OUTPUT"
          echo "Bumped: v${PREV_VERSION} -> v${VERSION} (build ${BUILD})"

      - name: Generate changelog
        id: changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/generate-changelog.sh
          mkdir -p build
          PREV_TAG="v${{ steps.version.outputs.previous_version }}"
          # Check if previous tag exists
          if git rev-parse "$PREV_TAG" >/dev/null 2>&1; then
            CHANGELOG=$(./scripts/generate-changelog.sh "$PREV_TAG")
          else
            CHANGELOG=$(./scripts/generate-changelog.sh)
          fi
          # Write to file for multiline handling
          echo "$CHANGELOG" > build/changelog.md
          echo "changelog_path=build/changelog.md" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        run: |
          chmod +x scripts/update-changelog.sh
          ./scripts/update-changelog.sh \
            "${{ steps.version.outputs.version }}" \
            "${{ steps.changelog.outputs.changelog_path }}"

      - name: Create release PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ steps.version.outputs.version }}"
          BRANCH="release/${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create release branch and commit changes
          git checkout -B "$BRANCH"
          git add Snapzy.xcodeproj/project.pbxproj CHANGELOG.md
          git commit -m "chore: bump version to ${VERSION}"
          git push --force origin "$BRANCH"

          # Build PR body
          {
            echo "## Release ${VERSION}"
            echo ""
            cat build/changelog.md
            echo ""
            echo "---"
            echo "*Auto-generated by release workflow. Merge this PR to publish the release.*"
          } > build/pr-body.md

          # Create PR (or update if already exists)
          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING_PR" ]; then
            gh pr edit "$EXISTING_PR" \
              --title "chore: release ${VERSION}" \
              --body-file build/pr-body.md
            echo "Updated existing PR #${EXISTING_PR}"
          else
            gh pr create \
              --base master \
              --head "$BRANCH" \
              --title "chore: release ${VERSION}" \
              --body-file build/pr-body.md
          fi
