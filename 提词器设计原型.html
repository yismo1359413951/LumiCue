<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>隐形提词器 · 设计原型</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; }
  body{
    font-family:-apple-system,"PingFang SC","Helvetica Neue",sans-serif;
    background:#0a0b10;
    overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    color:#fff;
  }
  /* 模拟一段录屏/桌面背景（让玻璃模糊有东西可糊） */
  .backdrop{
    position:fixed; inset:0; z-index:0;
    background:
      radial-gradient(40vw 40vw at 18% 22%, #1e3a8a55, transparent 60%),
      radial-gradient(46vw 46vw at 82% 30%, #6d28d944, transparent 60%),
      radial-gradient(50vw 50vw at 55% 88%, #0d948844, transparent 60%),
      linear-gradient(135deg,#0a0b10,#11131c 60%,#0a0b10);
  }
  .backdrop::after{
    content:""; position:absolute; inset:0;
    background-image:repeating-linear-gradient(0deg, #ffffff06 0 1px, transparent 1px 42px);
    opacity:.5;
  }
  .hint{
    position:fixed; top:22px; left:0; right:0; z-index:5; text-align:center;
    font-size:13px; letter-spacing:.04em; color:#ffffff66;
  }

  /* ===== 提词器玻璃舱 ===== */
  .island{
    position:relative; z-index:3;
    width:720px; height:340px;
    border-radius:34px;
    background:
      radial-gradient(120% 100% at 50% 0%, #1a1d2bcc, #0c0e15ee 70%);
    backdrop-filter:blur(28px) saturate(140%);
    -webkit-backdrop-filter:blur(28px) saturate(140%);
    box-shadow:
      0 24px 80px -20px #000c,
      inset 0 1px 0 #ffffff22,
      inset 0 0 0 1px #ffffff10;
    overflow:hidden;
    isolation:isolate;
  }
  /* 发光描边（科技感细边，缓慢呼吸 / 流光） */
  .island::before{
    content:""; position:absolute; inset:0; border-radius:34px; padding:1px;
    background:linear-gradient(130deg,#5eead4aa,#818cf833 35%,#ffffff11 50%,#c084fc55 70%,#5eead488);
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor; mask-composite:exclude;
    opacity:.55; animation:hue 9s linear infinite; pointer-events:none; z-index:6;
  }
  @keyframes hue{ to{ filter:hue-rotate(360deg);} }

  /* 噪点颗粒（高级质感） */
  .grain{
    position:absolute; inset:0; z-index:5; pointer-events:none; opacity:.05;
    mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  /* God-ray 体积光束：从顶部打到焦点行 */
  .ray{
    position:absolute; left:50%; top:-6%; transform:translateX(-50%);
    width:78%; height:78%; z-index:1; pointer-events:none;
    background:linear-gradient(180deg,#bff7ff55,#7dd3fc22 38%,transparent 72%);
    clip-path:polygon(40% 0,60% 0,82% 100%,18% 100%);
    filter:blur(14px);
    mix-blend-mode:screen;
    animation:ray 6s ease-in-out infinite;
  }
  @keyframes ray{ 0%,100%{opacity:.55} 50%{opacity:.85} }
  /* 焦点行底部一抹高光地台 */
  .stage{
    position:absolute; left:50%; top:46%; transform:translate(-50%,-50%);
    width:86%; height:64px; z-index:1; pointer-events:none;
    background:radial-gradient(60% 100% at 50% 50%, #67e8f93a, transparent 70%);
    filter:blur(6px);
  }

  /* 文字层 */
  .lines{ position:absolute; inset:0; z-index:2; }
  .line{
    position:absolute; left:0; right:0; text-align:center;
    font-weight:600; line-height:1.25; will-change:transform,opacity,filter;
    padding:0 48px; white-space:nowrap;
    text-shadow:0 2px 18px #000a;
  }
  .line.focus{
    color:#fff;
    text-shadow:0 0 22px #a5f3fc88, 0 2px 18px #000a;
  }
  /* 焦点行下的流光下划线 */
  .underbar{
    position:absolute; left:50%; top:53%; transform:translateX(-50%);
    width:0; height:2px; z-index:2; border-radius:2px;
    background:linear-gradient(90deg,transparent,#67e8f9,#a78bfa,transparent);
    box-shadow:0 0 14px #67e8f9aa; opacity:.9; transition:width .2s;
  }
  /* 扫光（每念过一行掠过一次） */
  .sweep{
    position:absolute; top:42%; left:-30%; width:30%; height:16%; z-index:4;
    background:linear-gradient(90deg,transparent,#ffffff22,transparent);
    filter:blur(8px); pointer-events:none; opacity:0;
  }
  .sweep.go{ animation:sweep .7s ease-out; }
  @keyframes sweep{ 0%{left:-30%;opacity:.9} 100%{left:100%;opacity:0} }

  /* 顶部隐形状态微标 */
  .stealth{
    position:absolute; top:16px; left:20px; z-index:7;
    display:flex; align-items:center; gap:7px;
    font-size:11px; letter-spacing:.08em; color:#a5f3fccc;
    text-transform:uppercase;
  }
  .stealth .dot{ width:6px; height:6px; border-radius:50%; background:#34d399;
    box-shadow:0 0 8px #34d399; animation:blink 2s infinite; }
  @keyframes blink{ 0%,100%{opacity:1} 50%{opacity:.3} }

  /* 控制条：内嵌小玻璃药丸 */
  .bar{
    position:absolute; top:14px; right:16px; z-index:8;
    display:flex; align-items:center; gap:3px;
    padding:5px; border-radius:16px;
    background:#ffffff10; border:1px solid #ffffff18;
    backdrop-filter:blur(10px);
  }
  .bar button{
    all:unset; width:30px; height:30px; border-radius:11px;
    display:flex; align-items:center; justify-content:center;
    color:#e5e7eb; font-size:13px; cursor:pointer; transition:.15s;
  }
  .bar button:hover{ background:#ffffff1c; color:#fff; box-shadow:0 0 12px #67e8f955; }
  .bar svg{ width:16px; height:16px; stroke:currentColor; stroke-width:1.7; fill:none; }
  .bar .lbl{ font-size:12px; font-weight:600; }

  /* 底部发光进度 */
  .progress{
    position:absolute; left:24px; right:24px; bottom:18px; z-index:7;
    display:flex; align-items:center; gap:12px;
  }
  .track{ position:relative; flex:1; height:3px; border-radius:3px; background:#ffffff18; }
  .fill{ position:absolute; left:0; top:0; height:100%; border-radius:3px;
    background:linear-gradient(90deg,#22d3ee,#a78bfa); box-shadow:0 0 12px #67e8f9aa; }
  .head{ position:absolute; top:50%; width:9px; height:9px; border-radius:50%;
    transform:translate(-50%,-50%); background:#fff; box-shadow:0 0 12px 2px #a5f3fc; }
  .pct{ font-variant-numeric:tabular-nums; font-size:12px; color:#a5f3fccc; min-width:34px; text-align:right; }
</style>
</head>
<body>
  <div class="backdrop"></div>
  <div class="hint">设计原型 · 真机上录屏/直播观众完全看不到它（只有你看得到）</div>

  <div class="island" id="island">
    <div class="ray"></div>
    <div class="stage"></div>
    <div class="sweep" id="sweep"></div>
    <div class="stealth"><span class="dot"></span>录屏隐形</div>

    <div class="bar">
      <button id="play" aria-label="播放暂停"><svg viewBox="0 0 24 24"><rect x="7" y="6" width="3.5" height="12" rx="1"/><rect x="14" y="6" width="3.5" height="12" rx="1"/></svg></button>
      <button aria-label="编辑"><svg viewBox="0 0 24 24"><path d="M5 19h14"/><path d="M14 6l4 4-9 9H5v-4z"/></svg></button>
      <button aria-label="减速"><span class="lbl">A−</span></button>
      <button aria-label="加速"><span class="lbl">A+</span></button>
      <button aria-label="速度"><svg viewBox="0 0 24 24"><path d="M5 12h7"/><path d="M5 7h11"/><path d="M5 17h9"/></svg></button>
      <button aria-label="关闭"><svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    </div>

    <div class="lines" id="lines"></div>
    <div class="underbar" id="underbar"></div>

    <div class="progress">
      <div class="track"><div class="fill" id="fill"></div><div class="head" id="phead"></div></div>
      <div class="pct" id="pct">0%</div>
    </div>
  </div>

<script>
const script = [
  "大家好，今天给你们安利一个东西",
  "做录屏的时候我总忘词，盯提词器又出戏",
  "直到我用上这个——隐形提词器",
  "它就浮在我屏幕上，我看得清清楚楚",
  "但录屏里、直播里，观众一个字都看不到",
  "当前这句最大最亮，像被一束光打中",
  "上下行往里缩、变暗、虚化，眼睛只盯一行",
  "念完一句，光一扫，进度往前走一格",
  "高级、有科技感，念稿不再尴尬",
  "好了，链接放评论区，我们下期见"
];
const linesEl=document.getElementById('lines');
const els=script.map(t=>{const d=document.createElement('div');d.className='line';d.textContent=t;linesEl.appendChild(d);return d;});
const island=document.getElementById('island');
const underbar=document.getElementById('underbar');
const sweep=document.getElementById('sweep');
const fill=document.getElementById('fill');
const phead=document.getElementById('phead');
const pct=document.getElementById('pct');

let scroll=0, speed=0.16, lastFocus=-1, fontBase=34, gap=64;
const focusFrac=0.42;

function frame(){
  const H=island.clientHeight, W=island.clientWidth;
  const focusY=H*focusFrac;
  const total=(script.length-1)*gap;
  scroll+=speed; if(scroll>total+gap*2) scroll=-gap;

  let focusIdx=Math.round(scroll/gap);
  els.forEach((el,i)=>{
    const natural=i*gap;
    const d=natural-scroll;            // 距焦点的内容距离
    const y=focusY+d;
    const ad=Math.abs(d);
    let t=Math.min(1, ad/(gap*3.2));
    t=t*t*(3-2*t);
    const scale=1-(1-0.52)*t;
    const op=1-(1-0.12)*t;
    const blur=t*3.2;
    const size=fontBase;
    el.style.fontSize=size+'px';
    el.style.top=(y-size)+'px';
    el.style.transform=`scale(${scale.toFixed(3)})`;
    el.style.opacity=op.toFixed(3);
    el.style.filter=`blur(${blur.toFixed(2)}px)`;
    el.classList.toggle('focus', ad<gap*0.45);
  });

  // 焦点行下划线宽度跟随焦点行字数
  const fi=Math.max(0,Math.min(script.length-1,focusIdx));
  underbar.style.width=Math.min(W*0.7, script[fi].length*16)+'px';

  // 念过一行 → 扫光
  if(focusIdx!==lastFocus && focusIdx>lastFocus && focusIdx>0){
    sweep.classList.remove('go'); void sweep.offsetWidth; sweep.classList.add('go');
  }
  lastFocus=focusIdx;

  // 进度
  const p=Math.max(0,Math.min(1, scroll/total));
  fill.style.width=(p*100)+'%';
  phead.style.left=(p*100)+'%';
  pct.textContent=Math.round(p*100)+'%';

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// 播放/暂停演示
let playing=true;const playBtn=document.getElementById('play');
playBtn.onclick=()=>{playing=!playing;speed=playing?0.16:0;
  playBtn.innerHTML=playing
   ?'<svg viewBox="0 0 24 24"><rect x="7" y="6" width="3.5" height="12" rx="1"/><rect x="14" y="6" width="3.5" height="12" rx="1"/></svg>'
   :'<svg viewBox="0 0 24 24"><path d="M8 5l11 7-11 7z"/></svg>';};
</script>
</body>
</html>
